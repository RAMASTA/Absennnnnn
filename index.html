<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Online</title>
    
    <!-- Memanggil Library Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: #f0f2f5; }
        .container { max-width: 500px; margin: auto; background: white; min-height: 100vh; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; }
        
        /* Navigasi Tab */
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav button { flex: 1; padding: 12px; border: none; background: #e4e6eb; color: #333; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav button.active { background: #007bff; color: white; }
        .tab { display: none; }
        .tab.active { display: block; }
        
        /* Scanner */
        video { width: 100%; border-radius: 12px; background: #000; margin-bottom: 15px; transform: scaleX(-1); }
        .input-group { margin-bottom: 15px; }
        input[type="text"], input[type="date"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; }
        .btn-group { display: flex; gap: 10px; }
        .btn-group button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; font-size: 16px; }
        .btn-masuk { background: #28a745; }
        .btn-pulang { background: #dc3545; }
        
        /* Tabel */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #f8f9fa; }
        .foto-container img { max-width: 45px; border-radius: 5px; margin: 2px; border: 1px solid #ccc; }
        
        /* Admin Form */
        .admin-form { display: flex; gap: 10px; margin-bottom: 15px; }
        .admin-form input { margin-bottom: 0; text-align: left; }
        .btn-tambah { background: #007bff; color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-hapus { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Absensi</h2>

    <!-- Navigasi -->
    <div class="nav">
        <button id="btn-scanner" class="active" onclick="bukaTab('scanner')">Scanner</button>
        <!-- Tombol Admin sekarang memanggil fungsi cekPasswordAdmin -->
        <button id="btn-admin" onclick="cekPasswordAdmin()">Admin</button>
        <button id="btn-laporan" onclick="bukaTab('laporan')">Laporan</button>
    </div>

    <!-- TAB 1: SCANNER -->
    <div id="scanner" class="tab active">
        <video id="video" autoplay playsinline></video>
        <div class="input-group">
            <input type="text" id="pinInput" placeholder="Masukkan PIN Anda">
        </div>
        <div class="btn-group">
            <button class="btn-masuk" onclick="prosesAbsen('masuk')">ABSEN MASUK</button>
            <button class="btn-pulang" onclick="prosesAbsen('pulang')">ABSEN PULANG</button>
        </div>
    </div>

    <!-- TAB 2: ADMIN -->
    <div id="admin" class="tab">
        <div class="admin-form">
            <input type="text" id="newPin" placeholder="PIN Baru" style="width: 30%;">
            <input type="text" id="newNama" placeholder="Nama Karyawan">
            <button class="btn-tambah" onclick="tambahKaryawan()">Tambah</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>PIN</th>
                    <th>Nama</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabelAdmin">
                <!-- Data Karyawan Muncul Disini -->
            </tbody>
        </table>
    </div>

    <!-- TAB 3: LAPORAN -->
    <div id="laporan" class="tab">
        <input type="date" id="tglLaporan" onchange="renderRiwayat()">
        <input type="text" id="cariRiwayat" placeholder="Cari Nama / PIN..." onkeyup="renderRiwayat()">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Masuk</th>
                    <th>Pulang</th>
                    <th>Foto</th>
                </tr>
            </thead>
            <tbody id="tabelLaporan">
                <!-- Data Riwayat Muncul Disini -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // ==========================================
    // 1. KONFIGURASI FIREBASE
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyClyJ2midd0s8kvgxehUHda8SJdQhXALDk",
      authDomain: "absensikeren.firebaseapp.com",
      databaseURL: "https://absensikeren-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "absensikeren",
      storageBucket: "absensikeren.firebasestorage.app",
      messagingSenderId: "121393793533",
      appId: "1:121393793533:web:b14428a650d1fe05713194"
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ==========================================
    // 2. VARIABEL GLOBAL & LOGIKA KAMERA
    // ==========================================
    let dataKaryawan = {};
    let dataAbsensi = {};

    // Aktifkan Kamera
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Gagal mengakses kamera: " + err));

    function ambilFoto() {
        canvas.width = 300; 
        canvas.height = (video.videoHeight / video.videoWidth) * 300;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg', 0.6); 
    }

    // Fungsi Pindah Tab
    function bukaTab(idTab) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(idTab).classList.add('active');
        document.getElementById('btn-' + idTab).classList.add('active');
    }

    // Fungsi Cek Password Khusus Admin
    function cekPasswordAdmin() {
        let password = prompt("Masukkan Password Admin:");
        if (password === "RANGGA$") {
            bukaTab('admin');
        } else if (password !== null) { // Jika user tidak klik Cancel
            alert("Password Salah! Akses Ditolak.");
        }
    }

    // Set Tanggal Hari Ini di Laporan
    document.getElementById('tglLaporan').value = new Date().toISOString().split('T')[0];

    // ==========================================
    // 3. LOGIKA FIREBASE (REALTIME DATABASE)
    // ==========================================

    // A. Ambil Data Karyawan secara Realtime
    db.ref('karyawan').on('value', (snapshot) => {
        dataKaryawan = snapshot.val() || {};
        renderAdmin();
    });

    // B. Ambil Data Absensi secara Realtime
    db.ref('absensi').on('value', (snapshot) => {
        dataAbsensi = snapshot.val() || {};
        renderRiwayat();
    });

    // C. Tambah / Hapus Karyawan (Tersimpan Online)
    function tambahKaryawan() {
        let pin = document.getElementById('newPin').value;
        let nama = document.getElementById('newNama').value;
        if (pin && nama) {
            db.ref('karyawan/' + pin).set(nama);
            document.getElementById('newPin').value = '';
            document.getElementById('newNama').value = '';
            alert("Karyawan berhasil ditambahkan!");
        } else {
            alert("PIN dan Nama wajib diisi!");
        }
    }

    function hapusKaryawan(pin) {
        if (confirm('Yakin ingin menghapus karyawan ini?')) {
            db.ref('karyawan/' + pin).remove();
        }
    }

    // D. Proses Absen Masuk & Pulang
    function prosesAbsen(tipe) {
        let pin = document.getElementById('pinInput').value;
        if (!pin || !dataKaryawan[pin]) {
            alert("PIN tidak valid atau tidak terdaftar!");
            return;
        }

        let foto = ambilFoto();
        let tgl = new Date().toISOString().split('T')[0];
        let waktu = new Date().toLocaleTimeString('id-ID'); 
        let nama = dataKaryawan[pin];

        if (tipe === 'masuk') {
            db.ref(`absensi/${tgl}/${pin}`).update({
                nama: nama,
                masuk: waktu,
                fotoMasuk: foto
            }).then(() => {
                alert(`Terima kasih ${nama}, Absen MASUK berhasil!`);
                document.getElementById('pinInput').value = '';
            });
        } else if (tipe === 'pulang') {
            db.ref(`absensi/${tgl}/${pin}`).update({
                nama: nama,
                pulang: waktu,
                fotoPulang: foto
            }).then(() => {
                alert(`Terima kasih ${nama}, Absen PULANG berhasil!`);
                document.getElementById('pinInput').value = '';
            });
        }
    }

    // ==========================================
    // 4. RENDER TAMPILAN KE LAYAR
    // ==========================================
    function renderAdmin() {
        let tbody = document.getElementById('tabelAdmin');
        tbody.innerHTML = '';
        for (let pin in dataKaryawan) {
            tbody.innerHTML += `
                <tr>
                    <td><b>${pin}</b></td>
                    <td>${dataKaryawan[pin]}</td>
                    <td><button class="btn-hapus" onclick="hapusKaryawan('${pin}')">Hapus</button></td>
                </tr>
            `;
        }
    }

    function renderRiwayat() {
        let tglDipilih = document.getElementById('tglLaporan').value;
        let kataKunci = document.getElementById('cariRiwayat').value.toLowerCase();
        let tbody = document.getElementById('tabelLaporan');
        tbody.innerHTML = '';

        let dataHariIni = dataAbsensi[tglDipilih];

        if (dataHariIni) {
            let adaData = false;
            for (let pin in dataHariIni) {
                let d = dataHariIni[pin];
                
                if (d.nama.toLowerCase().includes(kataKunci) || pin.includes(kataKunci)) {
                    adaData = true;
                    let fotoM = d.fotoMasuk ? `<img src="${d.fotoMasuk}">` : '-';
                    let fotoP = d.fotoPulang ? `<img src="${d.fotoPulang}">` : '-';
                    let jamM = d.masuk ? `<span style="color:green; font-weight:bold;">${d.masuk}</span>` : '-';
                    let jamP = d.pulang ? `<span style="color:red; font-weight:bold;">${d.pulang}</span>` : '-';

                    tbody.innerHTML += `
                        <tr>
                            <td><b>${d.nama}</b><br><small>PIN: ${pin}</small></td>
                            <td>${jamM}</td>
                            <td>${jamP}</td>
                            <td class="foto-container">${fotoM} ${fotoP}</td>
                        </tr>
                    `;
                }
            }
            if (!adaData) {
                tbody.innerHTML = `<tr><td colspan="4">Data tidak ditemukan.</td></tr>`;
            }
        } else {
            tbody.innerHTML = `<tr><td colspan="4">Belum ada absensi pada tanggal ini.</td></tr>`;
        }
    }
</script>

</body>
</html>
